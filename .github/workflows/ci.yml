name: Testa, bygg och publicera

on:
  push:
    branches: ["main"]
  release:
    types: [published]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  kvalitet:
    name: Kvalitet och tester
    runs-on: ubuntu-latest
    steps:
      - name: Hämta källkod
        uses: actions/checkout@v4

      - name: Installera Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installera Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Installera backend-beroenden
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Installera frontend-beroenden
        run: npm ci --no-audit --no-fund

      - name: Installera Playwright Chromium
        run: npx playwright install --with-deps chromium

      - name: Typechecka React-frontenden
        run: npm run typecheck

      - name: Bygg React-frontenden
        run: npm run build:frontend

      - name: Kör backendtester
        run: python -m pytest -q

      - name: Kör webbläsartester
        run: npm run test:frontend

  docker_smoke:
    name: Bygg och smoke-testa Docker-image
    runs-on: ubuntu-latest
    needs: kvalitet
    steps:
      - name: Hämta källkod
        uses: actions/checkout@v4

      - name: Bygg lokal testimage
        run: docker build -t turneringar:test .

      - name: Smoke-testa och verifiera persistens efter omstart
        run: |
          docker volume create turneringar-test-data
          docker run -d --name turneringar-test -p 8000:8000 \
            -v turneringar-test-data:/data/turneringar \
            -e ADMIN_PIN=test-pin \
            -e SESSION_SECRET=ci-test-secret \
            -e TURNERINGAR_DB=/data/turneringar/test.sqlite3 \
            turneringar:test
          trap 'docker logs turneringar-test || true; docker rm -f turneringar-test || true; docker volume rm turneringar-test-data || true' EXIT

          # Smoke-testa att servern är igång
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/session > /tmp/session.json; then
              break
            fi
            sleep 1
          done
          grep -q '"admin_pin_default":false' /tmp/session.json
          curl --fail --silent http://127.0.0.1:8000/ > /tmp/index.html
          curl --fail --silent http://127.0.0.1:8000/assets/app.js > /tmp/app.js
          curl --fail --silent http://127.0.0.1:8000/assets/tv.js > /tmp/tv.js
          chunk_ref=$(grep -o '\./chunks/[^"]*\.js' /tmp/app.js | head -n 1)
          test -n "$chunk_ref"
          chunk_path="/assets/chunks/${chunk_ref#./chunks/}"
          curl --fail --silent "http://127.0.0.1:8000${chunk_path}" > /tmp/react-chunk.js
          test -s /tmp/index.html
          test -s /tmp/app.js
          test -s /tmp/tv.js
          test -s /tmp/react-chunk.js

          # Logga in och spara sessions-cookie (före omstart)
          curl --fail --silent -c /tmp/session-cookies.txt \
            -X POST http://127.0.0.1:8000/api/admin/login \
            -H "Content-Type: application/json" \
            -d '{"pin":"test-pin"}' > /tmp/login.json
          grep -q '"ok":true' /tmp/login.json

          # Skapa data via API
          curl --fail --silent -b /tmp/session-cookies.txt \
            -X POST http://127.0.0.1:8000/api/tournaments \
            -H "Content-Type: application/json" \
            -d '{"name":"Persistens-test","starts_at":"2028-01-01T10:00","group_count":2,"qualifiers_per_group":1}' > /tmp/create.json
          tournament_id=$(python3 -c "import json;print(json.load(open('/tmp/create.json'))['id'])")
          test -n "$tournament_id"

          # Starta om containern med samma SESSION_SECRET
          docker stop turneringar-test
          docker rm turneringar-test
          docker run -d --name turneringar-test -p 8000:8000 \
            -v turneringar-test-data:/data/turneringar \
            -e ADMIN_PIN=test-pin \
            -e SESSION_SECRET=ci-test-secret \
            -e TURNERINGAR_DB=/data/turneringar/test.sqlite3 \
            turneringar:test
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/session > /dev/null 2>&1; then
              break
            fi
            sleep 1
          done

          # Sessions-cookie från före omstart ska fortfarande gälla
          curl --fail --silent -b /tmp/session-cookies.txt \
            "http://127.0.0.1:8000/api/session" > /tmp/session-after-restart.json
          grep -q '"is_admin":true' /tmp/session-after-restart.json
          echo "Session survived restart!"

          # Verifiera att turneringen finns kvar efter omstart
          curl --fail --silent -b /tmp/session-cookies.txt \
            "http://127.0.0.1:8000/api/tournaments" > /tmp/tournaments.json
          grep -q "Persistens-test" /tmp/tournaments.json
          echo "Data persisted across restart!"

  publicera:
    name: Publicera Docker-image
    runs-on: ubuntu-latest
    needs: docker_smoke
    if: github.event_name == 'push' || github.event_name == 'release'
    steps:
      - name: Hämta källkod
        uses: actions/checkout@v4

      - name: Förbered Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Skapa Docker-taggar
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/bjorkan/turneringar
            bjorkan/turneringar
          tags: |
            type=raw,value=edge,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}

      - name: Logga in i GitHub Packages
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Logga in i Docker Hub
        uses: docker/login-action@v3
        with:
          username: bjorkan
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Bygg och publicera image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
