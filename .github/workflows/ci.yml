name: Test, build and publish

on:
  push:
    branches: ["main"]
  release:
    types: [published]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
      - name: Install frontend dependencies
        run: npm install --no-audit --no-fund
      - name: Install frontend browser
        run: npx playwright install --with-deps chromium
      - name: Typecheck frontend
        run: npm run typecheck
      - name: Build frontend
        run: npm run build:frontend
      - name: Run tests
        run: python -m pytest -q
      - name: Run frontend browser tests
        run: npm run test:frontend

  docker:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image for smoke test
        run: docker build -t turneringar:test .

      - name: Smoke test Docker image
        run: |
          docker run -d --name turneringar-test -p 8000:8000 \
            -e ADMIN_PIN=test-pin \
            -e TURNERINGAR_DB=/data/turneringar/test.sqlite3 \
            turneringar:test
          trap 'docker logs turneringar-test || true; docker rm -f turneringar-test || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8000/api/session > /tmp/session.json; then
              break
            fi
            sleep 1
          done
          grep -q '"admin_pin_default":false' /tmp/session.json
          curl --fail --silent http://127.0.0.1:8000/ > /tmp/index.html
          curl --fail --silent http://127.0.0.1:8000/assets/app.js > /tmp/app.js
          curl --fail --silent http://127.0.0.1:8000/assets/tv.js > /tmp/tv.js
          curl --fail --silent http://127.0.0.1:8000/assets/vendor/vue.global.prod.js > /tmp/vue.js
          test -s /tmp/index.html
          test -s /tmp/app.js
          test -s /tmp/tv.js
          test -s /tmp/vue.js

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/bjorkan/turneringar
            bjorkan/turneringar
          tags: |
            type=raw,value=edge,enable=${{ github.event_name == 'push' && github.ref == 'refs/heads/main' }}
            type=raw,value=latest,enable=${{ github.event_name == 'release' }}
            type=raw,value=pr-${{ github.event.number }},enable=${{ github.event_name == 'pull_request' }}

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Log in to Docker Hub
        if: github.event_name == 'push' || github.event_name == 'release'
        uses: docker/login-action@v3
        with:
          username: bjorkan
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and optionally publish image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' || github.event_name == 'release' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
